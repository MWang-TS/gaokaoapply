<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- Deep blue background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a237e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#283593;stop-opacity:1" />
    </linearGradient>
    <!-- Gold gradient for cap -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD54F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF8F00;stop-opacity:1" />
    </linearGradient>
    <!-- Star glow gradient -->
    <radialGradient id="starGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#64B5F6;stop-opacity:0" />
    </radialGradient>
    <!-- Card gradient -->
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.95" />
      <stop offset="100%" style="stop-color:#E3F2FD;stop-opacity:0.95" />
    </linearGradient>
    <!-- Shadow filter -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
    <filter id="capShadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Background circle -->
  <rect width="1024" height="1024" rx="200" fill="url(#bgGrad)"/>

  <!-- Subtle background pattern - concentric rings -->
  <circle cx="512" cy="512" r="420" fill="none" stroke="#FFFFFF" stroke-width="1" opacity="0.05"/>
  <circle cx="512" cy="512" r="350" fill="none" stroke="#FFFFFF" stroke-width="1" opacity="0.05"/>
  <circle cx="512" cy="512" r="280" fill="none" stroke="#FFFFFF" stroke-width="1" opacity="0.05"/>

  <!-- Application card / document -->
  <rect x="240" y="480" width="544" height="380" rx="24" fill="url(#cardGrad)" filter="url(#shadow)"/>

  <!-- Card ruled lines (simulating a form) -->
  <line x1="290" y1="560" x2="734" y2="560" stroke="#BBDEFB" stroke-width="3" stroke-linecap="round"/>
  <line x1="290" y1="610" x2="700" y2="610" stroke="#BBDEFB" stroke-width="3" stroke-linecap="round"/>
  <line x1="290" y1="660" x2="720" y2="660" stroke="#BBDEFB" stroke-width="3" stroke-linecap="round"/>
  <line x1="290" y1="710" x2="680" y2="710" stroke="#BBDEFB" stroke-width="3" stroke-linecap="round"/>
  <!-- Small colored fill-in blocks simulating choices -->
  <rect x="290" y="540" width="80" height="16" rx="4" fill="#1565C0" opacity="0.7"/>
  <rect x="290" y="590" width="60" height="16" rx="4" fill="#1976D2" opacity="0.6"/>
  <rect x="290" y="640" width="100" height="16" rx="4" fill="#1565C0" opacity="0.5"/>

  <!-- Check marks (✓) on card -->
  <path d="M 690 545 l 12 13 l 22 -20" stroke="#43A047" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <path d="M 690 597 l 12 13 l 22 -20" stroke="#43A047" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Graduation cap - board (flat top) -->
  <g filter="url(#capShadow)">
    <!-- Cap board diamond shape -->
    <polygon points="512,230  750,340  512,420  274,340" fill="url(#goldGrad)"/>
    <!-- Cap board bottom face (3D effect) -->
    <polygon points="274,340  274,360  512,440  512,420" fill="#E65100" opacity="0.5"/>
    <polygon points="750,340  750,360  512,440  512,420" fill="#E65100" opacity="0.3"/>
    <!-- Cap cylinder (mortarboard body) -->
    <ellipse cx="512" cy="370" rx="120" ry="40" fill="#FF8F00"/>
    <rect x="392" y="340" width="240" height="30" fill="#FF8F00"/>
    <ellipse cx="512" cy="340" rx="120" ry="40" fill="#FFD54F"/>
    <!-- Tassel button on top -->
    <circle cx="512" cy="230" r="18" fill="#FF8F00"/>
    <!-- Tassel cord -->
    <path d="M 750,350 Q 800,400 790,460 Q 785,490 770,510" stroke="#FF8F00" stroke-width="6" fill="none" stroke-linecap="round"/>
    <!-- Tassel end -->
    <line x1="760" y1="505" x2="750" y2="540" stroke="#FF8F00" stroke-width="4" stroke-linecap="round"/>
    <line x1="770" y1="507" x2="768" y2="545" stroke="#FF8F00" stroke-width="4" stroke-linecap="round"/>
    <line x1="780" y1="505" x2="785" y2="540" stroke="#FF8F00" stroke-width="4" stroke-linecap="round"/>
  </g>

  <!-- AI sparkle stars -->
  <!-- Top right star -->
  <g transform="translate(780, 180)">
    <circle r="22" fill="url(#starGlow)" opacity="0.7"/>
    <polygon points="0,-18 4,-6 17,-6 7,3 11,15 0,7 -11,15 -7,3 -17,-6 -4,-6" fill="#FFFFFF" opacity="0.95"/>
  </g>
  <!-- Small stars scattered -->
  <g transform="translate(680, 140)">
    <polygon points="0,-11 2.5,-3.5 10,-3.5 4.5,2 6.5,10 0,5.5 -6.5,10 -4.5,2 -10,-3.5 -2.5,-3.5" fill="#FFD54F" opacity="0.85"/>
  </g>
  <g transform="translate(840, 260)">
    <polygon points="0,-9 2,-3 8,-3 3.5,1.5 5.5,8 0,4.5 -5.5,8 -3.5,1.5 -8,-3 -2,-3" fill="#FFFFFF" opacity="0.7"/>
  </g>
  <g transform="translate(180, 320)">
    <polygon points="0,-9 2,-3 8,-3 3.5,1.5 5.5,8 0,4.5 -5.5,8 -3.5,1.5 -8,-3 -2,-3" fill="#FFD54F" opacity="0.6"/>
  </g>

  <!-- "志" character watermark (志愿 = aspiration) subtly in background -->
  <!-- Removed to keep it clean -->

  <!-- AI chip / circuit hint at bottom of card -->
  <circle cx="512" cy="810" r="28" fill="#1565C0" opacity="0.2"/>
  <circle cx="512" cy="810" r="18" fill="#1976D2" opacity="0.5"/>
  <!-- tiny circuit lines -->
  <line x1="484" y1="810" x2="460" y2="810" stroke="#1976D2" stroke-width="3" opacity="0.5" stroke-linecap="round"/>
  <line x1="540" y1="810" x2="564" y2="810" stroke="#1976D2" stroke-width="3" opacity="0.5" stroke-linecap="round"/>
  <line x1="512" y1="782" x2="512" y2="758" stroke="#1976D2" stroke-width="3" opacity="0.5" stroke-linecap="round"/>
  <line x1="460" y1="810" x2="450" y2="800" stroke="#1976D2" stroke-width="2" opacity="0.4" stroke-linecap="round"/>
  <line x1="460" y1="810" x2="450" y2="820" stroke="#1976D2" stroke-width="2" opacity="0.4" stroke-linecap="round"/>
  <!-- "AI" text inside chip -->
  <text x="512" y="817" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF" text-anchor="middle" opacity="0.9">AI</text>
</svg>
